<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Richard Bailey – Portfolio</title>
  <link rel="stylesheet" href="src/css/main.css?v=16">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <h1 id="profile-name"></h1>
      <p id="profile-title"></p>
      <div id="profile-contact"></div>
      <div id="admin-prompt-banner" class="admin-prompt-banner"></div>
      <nav class="tabs">
        <button class="tab tab--active" data-tab="intro">Introduction</button>
        <button class="tab" data-tab="experience">Experience</button>
        <button class="tab" data-tab="timeline">Timeline</button>
        <button class="tab" data-tab="projects">Projects</button>
        <button class="tab" data-tab="learning">Learning</button>
        <button class="tab" data-tab="skills">Skills &amp; Publications</button>
      </nav>
    </div>
  </header>

  <div id="pane-intro" class="tab-pane tab-pane--active">
    <main>
      <div class="container">
        <div id="intro-content" class="intro-content"></div>
      </div>
    </main>
  </div>

  <div id="pane-experience" class="tab-pane">
    <div class="filter-panel">
      <div class="container">
        <div class="filter-bar">
          <button class="filter-toggle-btn" id="filter-toggle">
            Filters
            <span id="filter-active-count" class="filter-active-count"></span>
            <span class="filter-chevron">▾</span>
          </button>
          <span id="result-count" class="result-count"></span>
          <button id="clear-btn" class="clear-btn">Clear All</button>
        </div>
        <div class="filter-body" id="filter-body">
          <div class="search-row">
            <input type="text" id="search-input" placeholder="Search achievements, technologies, customers…" autocomplete="off">
          </div>
          <div class="filter-group">
            <span class="filter-label">Role</span>
            <div class="filter-chips" id="type-filters"></div>
          </div>
          <div class="filter-group">
            <span class="filter-label">Experience</span>
            <div class="filter-chips" id="experience-filters"></div>
          </div>
          <div id="experience-chart" class="experience-chart"></div>
          <div class="filter-group">
            <label class="toggle-label">
              <input type="checkbox" id="metrics-toggle">
              <span>Metrics only</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <main>
      <div class="container">
        <div id="timeline"></div>
      </div>
    </main>
  </div>

  <div id="pane-timeline" class="tab-pane">
    <main>
      <div class="container">
        <div id="career-timeline"></div>
      </div>
    </main>
  </div>

  <div id="pane-projects" class="tab-pane">
    <main>
      <div class="container">
        <div id="projects-content"></div>
      </div>
    </main>
  </div>

  <div id="pane-learning" class="tab-pane">
    <main>
      <div class="container">
        <div id="learning-content"></div>
      </div>
    </main>
  </div>

  <div id="pane-skills" class="tab-pane">
    <main>
      <div class="container">
        <div id="skills-content"></div>
      </div>
    </main>
  </div>

  <div id="admin-popout" class="admin-popout"></div>

  <script src="src/js/app.js?v=16"></script>
</body>
</html>
